services:
  pay233-server:
    build:
      context: ./pay233-server
    command: ["-config", "/app/config.example.json"]
    ports:
      - "5500:5500"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:5500/healthz | grep ok"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
